# DEPRECATED — Cloudflare Pages deployment config.
# The canonical deployment is now Cloudflare Workers Assets via wrangler.jsonc.
# All API routes (OAuth, member auth) are handled by worker.js.
# This file is retained only as a reference for Cloudflare Pages fallback.

[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200
